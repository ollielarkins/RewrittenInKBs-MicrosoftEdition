<!doctype html><meta charset=utf-8><title>Rewritten in KBs — Microsoft Edition</title><meta name=viewport content="width=device-width,initial-scale=1"><meta name=theme-color content=#1e1e1e><style>
:root{--bg:#fff;--fg:#1a1a1a;--mut:#888;--ln:#0000001a;--ac:#3c8cf0}
@media(prefers-color-scheme:dark){:root{--bg:#1e1e1e;--fg:#e6e6e6;--mut:#8a8a8a;--ln:#ffffff1f}}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg);font:16px/1.6 system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:640px;margin:0 auto;padding:4rem 1.25rem}
h1{font-size:1.9rem;margin:0;letter-spacing:-.02em}
.sub{color:var(--mut);margin:.6rem 0 2.5rem;font-size:1.05rem}
.ep{display:flex;align-items:center;gap:1rem;padding:1rem 0;border-top:1px solid var(--ln);text-decoration:none;color:inherit}
.ep:last-child{border-bottom:1px solid var(--ln)}
.ep:hover .name{color:var(--ac)}
.no{font:600 .8rem/1 ui-monospace,monospace;color:var(--mut);min-width:2.2rem}
.name{font-weight:600;font-size:1.15rem}
.stat{color:var(--mut);font-size:.9rem;margin-top:.15rem}
.soon{opacity:.5;cursor:default}
.arrow{margin-left:auto;color:var(--mut)}
footer{margin-top:2.5rem;color:var(--mut);font-size:.85rem}
footer a{color:var(--ac);text-decoration:none}
</style>
