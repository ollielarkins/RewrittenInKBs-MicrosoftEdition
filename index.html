<!doctype html><meta charset=utf-8><title>Notepad</title><meta name=viewport content="width=device-width,initial-scale=1"><meta name=theme-color content=#1e1e1e><link rel=manifest href=manifest.webmanifest><link rel=icon href=icon.svg><style>html,body{height:100%;margin:0}body{display:flex;flex-direction:column;font:14px/1.4 system-ui,sans-serif}#b{display:flex;gap:.5rem;padding:.4rem;border-bottom:1px solid #0002}#b button{font:inherit;padding:.25rem .7rem;cursor:pointer}#n{margin-left:auto;align-self:center;color:#888;font-size:12px}textarea{flex:1;border:0;outline:0;resize:none;padding:.8rem;font:14px/1.5 ui-monospace,Consolas,monospace;white-space:pre;tab-size:4}@media(prefers-color-scheme:dark){body,textarea{background:#1e1e1e;color:#ddd}}</style><div id=b><button id=o>Open</button><button id=s>Save</button><span id=n>untitled.txt</span></div><textarea id=p spellcheck=false autofocus placeholder="Start typing…"></textarea><script>
// Elements with an id are exposed as globals (p, n, o, s), so no getElementById.
let h=null                                     // File System Access handle, if any
p.value=localStorage.N||''                     // auto-save restore (LocalStorage)
p.oninput=()=>localStorage.N=p.value
o.onclick=async()=>{                            // Open
 if(window.showOpenFilePicker){
  const[g]=await showOpenFilePicker({types:[{accept:{'text/plain':['.txt']}}]}).catch(()=>[])
  if(!g)return;h=g;const f=await g.getFile();p.value=await f.text();n.textContent=f.name
 }else{                                         // fallback: <input type=file>
  const i=Object.assign(document.createElement('input'),{type:'file',accept:'.txt,text/plain'})
  i.onchange=async()=>{p.value=await i.files[0].text();n.textContent=i.files[0].name;localStorage.N=p.value}
  return i.click()
 }
 localStorage.N=p.value
}
s.onclick=async()=>{                            // Save
 const t=p.value
 if(window.showSaveFilePicker){
  h=h||await showSaveFilePicker({suggestedName:n.textContent,types:[{accept:{'text/plain':['.txt']}}]}).catch(()=>null)
  if(!h)return;const w=await h.createWritable();await w.write(t);await w.close();n.textContent=(await h.getFile()).name
 }else{                                         // fallback: download blob
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([t],{type:'text/plain'}))
  a.download=n.textContent;a.click();URL.revokeObjectURL(a.href)
 }
}
onkeydown=e=>{if(e.ctrlKey||e.metaKey){if(e.key=='s'){e.preventDefault();s.click()}if(e.key=='o'){e.preventDefault();o.click()}}}
'serviceWorker'in navigator&&addEventListener('load',()=>navigator.serviceWorker.register('sw.js'))
</script>
